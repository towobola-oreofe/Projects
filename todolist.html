<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="todolist.css">
    <link rel="stylesheet" href="boxicons.min.css">
</head>

<body>
    <div class="coverall">
        <div class="listbody">
            <div class="title">
                <h3>To-Do List</h3>
                <span class="note"><i class='bx bxs-notepad'></i></span>
                <span class="pencil"><i class='bx bxs-pencil'></i></span>
            </div>
            <div class="inputbar">
                <input type="text" placeholder="add your task" id="input-box">
                <button onclick="addTask()">Add</button>
            </div>
            <ul id="list-container">


            </ul>
        </div>
    </div>
    <script src="todolist_script.js">
    </script>
</body>

</html>
