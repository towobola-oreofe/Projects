<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(black, #000022);
            overflow: hidden;
        }
        
        .container {
            width: 80vw;
            height: 80vh;
            position: relative;
        }
        
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10cm;
            height: 10cm;
            background-color: yellow;
            box-shadow: 0 0 3cm white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .earth {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30cm;
            height: 30cm;
            border: 0.1cm solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: earthOrbit 36.3s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .earth-planet {
            position: absolute;
            top: 50%;
            left: 100%;
            width: 3cm;
            height: 3cm;
            background-color: aqua;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .moon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8cm;
            height: 8cm;
            border: 0.1cm solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moonOrbit 2.7s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        .moon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            width: 1.2cm;
            height: 1.2cm;
            background-color: silver;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        @keyframes earthOrbit {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        @keyframes moonOrbit {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sun"></div>
        <div class="earth">
            <div class="earth-planet">
                <div class="moon"></div>
            </div>
        </div>
    </div>
</body>

</html>
